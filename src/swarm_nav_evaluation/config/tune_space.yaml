# Tuning Space for Bayesian Optimization
# Defines parameter bounds for Optuna-based tuning.

objective:
  name: "minimize_exploration_time"
  metric: "exploration_time"
  direction: "minimize"

parameters:
- name: "max_linear_velocity"
  type: "float"
  min: 0.2
  max: 1.5

- name: "max_angular_velocity"
  type: "float"
  min: 0.5
  max: 3.0

- name: "robot_radius"
  type: "float"
  min: 0.15
  max: 0.35

- name: "time_horizon"
  type: "float"
  min: 0.5
  max: 5.0

- name: "num_robots"
  type: "int"
  min: 1
  max: 5

constraints:
- "max_linear_velocity > 0"
- "max_angular_velocity > 0"
- "robot_radius > 0"
- "time_horizon > 0"
- "num_robots >= 1"
- "num_robots <= 5"
